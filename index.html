<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Flujo TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root{--bg:#060608;--card:#111115;--glass:rgba(17,17,21,0.95);--text:#f0f0f3;--sub:#9a9aa0;--muted:#5c5c65;--red:#ff3b5c;--gold:#f0a500;--green:#00e676;--blue:#0095ff;--purple:#8b5cf6;--orange:#ff9100;--header:52px;--tab:60px;--radius:10px}
        *{margin:0;padding:0;box-sizing:border-box}
        html{font-size:16px;-webkit-font-smoothing:antialiased;background:#000;overflow-x:hidden}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.4;min-height:100vh;padding-bottom:var(--tab)}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:8px}

        .header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header);background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;padding:0 14px;justify-content:space-between}
        .logo{font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--gold),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hdr-actions{display:flex;gap:4px}.hdr-btn{background:none;border:none;font-size:1.15rem;cursor:pointer;color:var(--sub);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}.hdr-btn:active{background:rgba(255,255,255,0.06)}

        .hero{width:100%;height:200px;margin-top:var(--header);overflow:hidden;position:relative;background:linear-gradient(135deg,#1a1a2e,#060608)}
        .hero-img{width:100%;height:100%;object-fit:cover;opacity:0.7}
        .hero-gradient{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,var(--bg) 100%)}
        .hero-content{position:absolute;bottom:24px;left:14px;right:14px}
        .hero-badge{display:inline-block;background:var(--red);color:#fff;font-size:0.55rem;padding:2px 8px;border-radius:10px;margin-bottom:6px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
        .hero-title{font-size:1.3rem;font-weight:800;color:#fff}

        .tabs{position:sticky;top:var(--header);z-index:50;background:var(--bg);display:flex;gap:0;overflow-x:auto;padding:6px 10px;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,0.04)}
        .tabs::-webkit-scrollbar{display:none}
        .tab{flex-shrink:0;padding:7px 14px;border-radius:16px;font-size:0.72rem;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);border:none;font-family:'Inter',sans-serif;transition:all 0.2s}
        .tab.active{background:var(--red);color:#fff}

        .page{display:none;padding:0 8px}.page.active{display:block}

        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px}
        @media(min-width:500px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}}
        @media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}.hero{height:280px}.hero-title{font-size:1.6rem}}

        .card{border-radius:var(--radius);overflow:hidden;cursor:pointer;background:var(--card);transition:all 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.04);aspect-ratio:2/3;position:relative}
        .card:active{transform:scale(0.95)}
        .card-img{width:100%;height:100%;object-fit:cover;background:var(--card)}
        .card-bottom{position:absolute;bottom:0;left:0;right:0;padding:24px 6px 6px;background:linear-gradient(transparent,rgba(0,0,0,0.9))}
        .card-badge{position:absolute;top:5px;left:5px;color:#fff;font-size:0.4rem;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--red);text-transform:uppercase}
        .card-rating{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.7);color:var(--gold);font-size:0.5rem;font-weight:700;padding:1px 4px;border-radius:3px}
        .card-title{font-size:0.65rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card-sub{font-size:0.52rem;color:rgba(255,255,255,0.5)}

        .detail-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.96);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s;overflow-y:auto}
        .detail-overlay.active{opacity:1;pointer-events:all}
        .detail-backdrop{width:100%;height:300px;object-fit:cover}
        .detail-gradient{position:absolute;top:200px;left:0;right:0;height:100px;background:linear-gradient(transparent,rgba(0,0,0,0.96))}
        .detail-content{padding:20px;margin-top:-80px;position:relative;z-index:1}
        .detail-title{font-size:1.4rem;font-weight:800;margin-bottom:8px}
        .detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:0.7rem;color:var(--sub)}
        .detail-meta span{background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:10px}
        .detail-rating{color:var(--gold);font-weight:700}
        .detail-overview{font-size:0.8rem;color:var(--sub);line-height:1.5;margin-bottom:12px}
        .detail-genres{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
        .detail-genre{background:rgba(255,255,255,0.05);padding:3px 8px;border-radius:10px;font-size:0.65rem;color:var(--sub)}
        .detail-cast{font-size:0.7rem;color:var(--muted);margin-bottom:12px}
        .detail-close{position:absolute;top:14px;left:14px;background:rgba(0,0,0,0.6);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.1rem;z-index:10;display:flex;align-items:center;justify-content:center}
        .detail-play{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

        .player-overlay{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s}.player-overlay.active{opacity:1;pointer-events:all}
        .player-top{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,0.85)}.player-back{background:rgba(255,255,255,0.1);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer}.player-name{flex:1;font-weight:600;font-size:0.78rem;color:#fff}
        .player-screen{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative}.player-screen video,.player-screen iframe{width:100%;height:100%}
        .player-controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px;background:rgba(0,0,0,0.85)}.ctrl-btn{background:rgba(255,255,255,0.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:0.75rem;display:flex;align-items:center;justify-content:center}.ctrl-play{width:40px;height:40px;background:#fff;color:#000;font-size:1rem}
        .player-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);z-index:5;flex-direction:column;gap:8px}
        .spinner{width:26px;height:26px;border:3px solid rgba(255,255,255,0.12);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

        .search-overlay{position:fixed;inset:0;z-index:180;background:var(--bg);opacity:0;pointer-events:none;transition:opacity 0.3s;display:flex;flex-direction:column}.search-overlay.active{opacity:1;pointer-events:all}
        .search-header{padding:10px;display:flex;gap:8px;border-bottom:1px solid rgba(255,255,255,0.04)}.search-header input{flex:1;background:var(--card);border:1px solid rgba(255,255,255,0.05);color:var(--text);padding:8px 12px;border-radius:18px;font-size:0.78rem;outline:none;font-family:'Inter',sans-serif}.search-header button{background:none;border:none;color:var(--sub);font-size:0.78rem;cursor:pointer;font-weight:600}
        #searchResults{flex:1;overflow-y:auto;padding:10px}

        .settings-section{margin-bottom:16px;padding:0 6px}.settings-section h3{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .settings-btn{width:100%;padding:10px;background:var(--card);border:1px solid rgba(255,255,255,0.05);color:var(--text);border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;margin-bottom:5px}.settings-btn.primary{background:var(--red);color:#fff;text-align:center;border:none}.settings-btn.danger{color:#ff6b6b;border-color:rgba(255,107,107,0.3)}.settings-info{font-size:0.65rem;color:var(--muted);margin-top:3px}
        textarea{width:100%;height:100px;background:var(--bg);border:1px solid rgba(255,255,255,0.05);color:var(--text);padding:8px;border-radius:6px;font-size:0.7rem;outline:none;font-family:monospace;resize:vertical;margin-bottom:6px}
        input[type="url"]{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,0.05);color:var(--text);padding:8px;border-radius:6px;font-size:0.75rem;outline:none;font-family:'Inter',sans-serif;margin-bottom:6px}

        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:7px 16px;border-radius:16px;font-size:0.7rem;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1}
        .counter{position:fixed;top:var(--header);left:0;right:0;z-index:99;background:var(--gold);color:#000;text-align:center;padding:4px;font-size:0.65rem;font-weight:700;display:none}.counter.show{display:block}
    </style>
</head>
<body>

<header class="header">
    <div class="logo">📺 FLUJO TV</div>
    <div class="hdr-actions">
        <button class="hdr-btn" onclick="openSearch()">🔍</button>
    </div>
</header>

<div class="counter" id="counter"></div>

<section class="hero">
    <img src="https://image.tmdb.org/t/p/original/2nOQsluFuhv2ewyVhdMDP7FjUbJ.jpg" class="hero-img" id="heroImage" onerror="this.src='https://picsum.photos/1200/600'">
    <div class="hero-gradient"></div>
    <div class="hero-content">
        <span class="hero-badge" id="heroBadge">EN VIVO</span>
        <h2 class="hero-title" id="heroTitle">Flujo TV</h2>
    </div>
</section>

<div class="tabs" id="mainTabs">
    <button class="tab active" onclick="switchTab('tv')">📺 TV</button>
    <button class="tab" onclick="switchTab('movies')">🎬 Películas</button>
    <button class="tab" onclick="switchTab('series')">📺 Series</button>
    <button class="tab" onclick="switchTab('settings')">⚙️</button>
</div>

<div class="page active" id="pageTv"><div id="tvGrid" class="grid"></div></div>
<div class="page" id="pageMovies"><div id="moviesGrid" class="grid"><p style="text-align:center;color:var(--muted);padding:40px">Cargando películas...</p></div></div>
<div class="page" id="pageSeries"><div id="seriesGrid" class="grid"><p style="text-align:center;color:var(--muted);padding:40px">Cargando series...</p></div></div>
<div class="page" id="pageSettings">
    <div class="settings-section"><h3>📥 Importar lista</h3>
        <input type="url" id="m3uUrl" placeholder="URL de lista M3U..."><button class="settings-btn primary" onclick="importarLista()">📥 Cargar URL</button><p class="settings-info" id="importStatus"></p>
        <textarea id="m3uTexto" placeholder="O pega el texto de la lista..."></textarea><button class="settings-btn primary" onclick="importarTexto()">📋 Cargar texto</button><p class="settings-info" id="importTextStatus"></p>
    </div>
    <div class="settings-section"><h3>🗑️</h3><button class="settings-btn danger" onclick="clearData()">🗑️ Borrar canales</button></div>
    <div class="settings-section"><h3>ℹ️</h3><p class="settings-info">Flujo TV v3.0 • iptv-org • TMDB • Listas español</p></div>
</div>

<div class="detail-overlay" id="detailOverlay">
    <button class="detail-close" onclick="closeDetail()">←</button>
    <img class="detail-backdrop" id="detailBackdrop" src="" alt="">
    <div class="detail-gradient"></div>
    <div class="detail-content">
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-meta" id="detailMeta"></div>
        <p class="detail-overview" id="detailOverview"></p>
        <div class="detail-genres" id="detailGenres"></div>
        <p class="detail-cast" id="detailCast"></p>
        <button class="detail-play" onclick="playFromDetail()">▶ Reproducir</button>
    </div>
</div>

<div class="player-overlay" id="playerOverlay">
    <div class="player-top"><button class="player-back" id="playerBack">←</button><span class="player-name" id="playerName">Canal</span></div>
    <div class="player-screen"><video id="videoPlayer" playsinline style="display:none"></video><iframe id="moviePlayer" style="display:none;width:100%;height:100%;border:none" allow="autoplay;encrypted-media" allowfullscreen></iframe><div class="player-loading" id="playerLoading"><div class="spinner"></div><span style="color:#aaa;font-size:0.7rem">Cargando...</span></div></div>
    <div class="player-controls"><button class="ctrl-btn" onclick="seek(-10)">⏪</button><button class="ctrl-btn ctrl-play" id="playBtn" onclick="togglePlay()">▶</button><button class="ctrl-btn" onclick="seek(10)">⏩</button><button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🔊</button></div>
</div>

<div class="search-overlay" id="searchOverlay">
    <div class="search-header"><input type="text" id="searchInput" placeholder="Buscar canales, películas, series..."><button onclick="closeSearch()">Cancelar</button></div>
    <div id="searchResults"></div>
</div>
<div class="toast" id="toast"></div>

<script src="datos.js"></script>
<script src="tmdb.js"></script>
<script>
    // ============ APP PRINCIPAL ============
    let canales=[],peliculas=[],series=[],playerCh=null,detailCh=null,hls=null,currentTab='tv';

    // ============ CARDS ============
    function tvCard(c){const d=document.createElement('div');d.className='card';const n=c.name||'?',img=c.logo||`https://picsum.photos/400/560?random=${Math.random()*100}`;d.onclick=()=>openPlayer(c);d.innerHTML=`<img src="${img}" class="card-img" loading="lazy" onerror="this.src='https://picsum.photos/400/560?random=${Math.random()*100}'"><span class="card-badge">TV</span><div class="card-bottom"><div class="card-title">${n}</div><div class="card-sub">${c.group||''}</div></div>`;return d}
    function movieCard(m){const d=document.createElement('div');d.className='card';const n=m.title||'?',img=m.poster||`https://picsum.photos/400/560?random=${m.tmdbId||Math.random()*100}`;d.onclick=()=>openDetail(m);d.innerHTML=`<img src="${img}" class="card-img" loading="lazy" onerror="this.src='https://picsum.photos/400/560?random=${Math.random()*100}'"><span class="card-badge">🎬</span>${m.rating?`<span class="card-rating">⭐${m.rating}</span>`:''}<div class="card-bottom"><div class="card-title">${n}</div><div class="card-sub">${m.year||''}</div></div>`;return d}

    // ============ RENDER ============
    function renderTV(){const grid=document.getElementById('tvGrid');if(!canales.length){grid.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px">No hay canales. Andá a ⚙️ para importar una lista.</p>';return}grid.innerHTML='';const cats={};canales.forEach(c=>{const cat=c.group||'General';if(!cats[cat])cats[cat]=[];cats[cat].push(c)});Object.entries(cats).forEach(([cat,items])=>{const header=document.createElement('div');header.style.cssText='grid-column:1/-1;font-size:0.8rem;font-weight:700;padding:8px 4px 4px;color:var(--sub)';header.textContent=cat;grid.appendChild(header);items.forEach(c=>grid.appendChild(tvCard(c)))})}
    function renderMovies(){const grid=document.getElementById('moviesGrid');if(!peliculas.length){grid.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px">Cargando películas...</p>';return}grid.innerHTML='';const cats={};peliculas.forEach(m=>{const cat=m.year||'Sin año';if(!cats[cat])cats[cat]=[];cats[cat].push(m)});Object.entries(cats).sort((a,b)=>b[0]-a[0]).forEach(([cat,items])=>{const header=document.createElement('div');header.style.cssText='grid-column:1/-1;font-size:0.8rem;font-weight:700;padding:8px 4px 4px;color:var(--sub)';header.textContent=cat;grid.appendChild(header);items.forEach(m=>grid.appendChild(movieCard(m)))})}
    function renderSeries(){const grid=document.getElementById('seriesGrid');if(!series.length){grid.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px">Cargando series...</p>';return}grid.innerHTML='';series.forEach(s=>grid.appendChild(movieCard(s)))}

    // ============ NAVEGACIÓN ============
    function switchTab(t){currentTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));const tabs={tv:0,movies:1,series:2,settings:3};document.querySelectorAll('.tab')[tabs[t]]?.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}

    // ============ REPRODUCTOR ============
    function openPlayer(c){playerCh=c;document.getElementById('playerName').textContent=c.name||'Canal';document.getElementById('playerOverlay').classList.add('active');document.body.style.overflow='hidden';document.getElementById('videoPlayer').style.display='none';document.getElementById('moviePlayer').style.display='none';document.getElementById('playerLoading').style.display='flex';playStream(c.url)}
    function openMovie(c){playerCh=c;document.getElementById('playerName').textContent=c.title||'Película';document.getElementById('playerOverlay').classList.add('active');document.body.style.overflow='hidden';document.getElementById('videoPlayer').style.display='none';document.getElementById('moviePlayer').style.display='block';document.getElementById('playerLoading').style.display='flex';document.getElementById('moviePlayer').src=`https://vidlink.pro/${c.type==='series'?'tv':'movie'}/${c.tmdbId}`;document.getElementById('moviePlayer').onload=()=>document.getElementById('playerLoading').style.display='none'}
    function closePlayer(){document.getElementById('playerOverlay').classList.remove('active');document.body.style.overflow='';stop();document.getElementById('moviePlayer').src='';playerCh=null}
    function playStream(u){stop();const v=document.getElementById('videoPlayer'),l=document.getElementById('playerLoading');if(u&&u.includes('.m3u8')&&Hls.isSupported()){hls=new Hls({enableWorker:true});hls.loadSource(u);hls.attachMedia(v);hls.on(Hls.Events.MANIFEST_PARSED,()=>{l.style.display='none';v.style.display='block';v.play().catch(()=>{})});hls.on(Hls.Events.ERROR,()=>{l.style.display='none';toast('❌ No disponible')})}else if(u){v.src=u;v.style.display='block';v.play().then(()=>l.style.display='none').catch(()=>l.style.display='none')}else{l.style.display='none';toast('❌ Sin stream')}}
    function stop(){if(hls){hls.destroy();hls=null}const v=document.getElementById('videoPlayer');v.pause();v.src='';v.load();v.style.display='none';document.getElementById('playerLoading').style.display='none'}
    function togglePlay(){const v=document.getElementById('videoPlayer');if(v.paused){v.play();document.getElementById('playBtn').textContent='⏸'}else{v.pause();document.getElementById('playBtn').textContent='▶'}}
    function toggleMute(){const v=document.getElementById('videoPlayer');v.muted=!v.muted;document.getElementById('muteBtn').textContent=v.muted?'🔇':'🔊'}
    function seek(s){const v=document.getElementById('videoPlayer');if(v.src||hls)v.currentTime=Math.max(0,Math.min((v.duration||Infinity),v.currentTime+s))}

    // ============ DETALLE ============
    async function openDetail(c){detailCh=c;document.getElementById('detailTitle').textContent=c.title||c.name||'';document.getElementById('detailBackdrop').src=c.backdrop||c.poster||'';document.getElementById('detailOverview').textContent=c.overview||'Sin sinopsis disponible.';document.getElementById('detailMeta').innerHTML=`<span>⭐ ${c.rating||'?'}</span><span>📅 ${c.year||'?'}</span>`;document.getElementById('detailGenres').innerHTML=(c.genreIds||[]).map(id=>GENRES[id]?`<span class="detail-genre">${GENRES[id]}</span>`:'').join('');document.getElementById('detailCast').textContent='Cargando elenco...';document.getElementById('detailOverlay').classList.add('active');document.body.style.overflow='hidden';if(c.tmdbId){try{const r=await fetch(`https://api.themoviedb.org/3/${c.type==='series'?'tv':'movie'}/${c.tmdbId}/credits?api_key=${TMDB_KEY}&language=es`);const d=await r.json();document.getElementById('detailCast').textContent='🎭 '+(d.cast?.slice(0,5).map(a=>a.name).join(', ')||'No disponible')}catch(e){document.getElementById('detailCast').textContent=''}}}
    function closeDetail(){document.getElementById('detailOverlay').classList.remove('active');document.body.style.overflow='';detailCh=null}
    function playFromDetail(){if(detailCh){closeDetail();detailCh.type==='movie'||detailCh.type==='series'?openMovie(detailCh):openPlayer(detailCh)}}

    // ============ IMPORTAR ============
    async function importarLista(){const url=document.getElementById('m3uUrl').value.trim();const s=document.getElementById('importStatus');if(!url){s.textContent='⚠️ Pega una URL';return}s.textContent='⏳ Descargando...';try{const t=await fetchP(url);if(!t){s.textContent='❌ Error';return}const p=parseM3U(t);canales=p;renderTV();s.textContent=`✅ ${p.length} canales`;switchTab('tv')}catch(e){s.textContent='❌ Error'}}
    function importarTexto(){const t=document.getElementById('m3uTexto').value.trim();const s=document.getElementById('importTextStatus');if(!t||!t.includes('#EXTINF')){s.textContent='❌ No válido';return}const p=parseM3U(t);canales=p;renderTV();s.textContent=`✅ ${p.length} canales`;switchTab('tv')}
    function clearData(){if(confirm('¿Borrar?')){canales=[];renderTV();toast('🗑️ Borrado')}}

    // ============ BÚSQUEDA ============
    function openSearch(){document.getElementById('searchOverlay').classList.add('active');document.getElementById('searchInput').focus()}
    function closeSearch(){document.getElementById('searchOverlay').classList.remove('active');document.getElementById('searchInput').value='';document.getElementById('searchResults').innerHTML=''}
    document.getElementById('searchInput').addEventListener('input',function(e){const q=e.target.value.toLowerCase(),d=document.getElementById('searchResults');if(!q){d.innerHTML='';return}const all=[...canales.map(c=>({...c,sn:c.name||''})),...peliculas.map(m=>({...m,sn:m.title||'',type:'movie'})),...series.map(s=>({...s,sn:s.title||'',type:'series'}))];const r=all.filter(c=>c.sn.toLowerCase().includes(q)).slice(0,25);d.innerHTML=r.map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;cursor:pointer" onclick="c.type==='movie'||c.type==='series'?openDetail(c):openPlayer(c);closeSearch()"><img src="${c.poster||c.logo||'https://picsum.photos/36/36'}" style="width:34px;height:34px;border-radius:4px;object-fit:cover"><div><div style="font-weight:600;font-size:0.75rem">${c.sn}</div><div style="font-size:0.6rem;color:var(--muted)">${c.group||c.year||''}</div></div></div>`).join('')})

    document.getElementById('playerBack').addEventListener('click',closePlayer);
    document.getElementById('playerOverlay').addEventListener('click',function(e){if(e.target===this)closePlayer()});
    document.getElementById('searchOverlay').addEventListener('click',function(e){if(e.target===this)closeSearch()});

    let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000)}

    // ============ INICIO ============
    async function init(){
        // Cargar películas y series
        cargarPelis().then(()=>renderMovies());
        cargarSeries().then(()=>renderSeries());
        // Cargar listas de canales en español
        counter('⏳ Cargando canales...');
        let all=[];
        for(let i=0;i<LISTAS_ES.length;i++){
            counter(`⏳ ${i+1}/${LISTAS_ES.length}...`);
            try{const t=await fetchP(LISTAS_ES[i]);if(!t)continue;const p=parseM3U(t);all=all.concat(p)}catch(e){}
        }
        canales=all;renderTV();hideCounter();
        if(canales.length)toast(`✅ ${canales.length} canales`);
    }
    init();
</script>
</body>
