<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>IPTV Stream Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header class="header">
    <div class="logo">📺 IPTV<span>Stream</span></div>
    <div class="hdr-actions">
        <button class="hdr-btn" onclick="openSearch()">🔍</button>
        <button class="hdr-btn" onclick="cargarTodo()">🔄</button>
    </div>
</header>

<div class="counter" id="counter"></div>

<section class="hero">
    <div class="hero-backdrop">
        <img src="https://image.tmdb.org/t/p/original/2nOQsluFuhv2ewyVhdMDP7FjUbJ.jpg" class="hero-img" id="heroImage" onerror="this.src='https://picsum.photos/1200/600'">
        <div class="hero-gradient"></div>
    </div>
    <div class="hero-content">
        <span class="hero-badge">ARGENTINA</span>
        <h2 class="hero-title">IPTV Stream Pro</h2>
    </div>
</section>

<div class="page active" id="pageHome"><div id="tvSections"></div></div>
<div class="page" id="pageMovies"><div id="movieSections"></div></div>
<div class="page" id="pageSeries"><div id="seriesSections"></div></div>
<div class="page" id="pageSettings">
    <div class="settings-section">
        <h3>📺 Contenido</h3>
        <button class="settings-btn primary" onclick="cargarTodo()">🔄 Recargar todo</button>
        <p class="settings-info">Canales: <span id="sCh"></span> | Películas: <span id="sPelis"></span> | Series: <span id="sSeries"></span></p>
    </div>
    <div class="settings-section"><h3>🔍</h3><button class="settings-btn" onclick="openSearch()">🔍 Buscar</button></div>
    <div class="settings-section"><h3>🗑️</h3><button class="settings-btn danger" onclick="clearData()">🗑️ Borrar todo</button></div>
</div>

<nav class="tab-bar">
    <button class="tab-item active" onclick="switchPage('home')"><span class="tab-icon">🏠</span>Inicio</button>
    <button class="tab-item" onclick="switchPage('movies')"><span class="tab-icon">🎬</span>Películas</button>
    <button class="tab-item" onclick="switchPage('series')"><span class="tab-icon">📺</span>Series</button>
    <button class="tab-item" onclick="switchPage('settings')"><span class="tab-icon">⚙️</span>Ajustes</button>
</nav>

<div class="detail-overlay" id="detailOverlay">
    <button class="detail-close" onclick="closeDetail()">←</button>
    <img class="detail-backdrop" id="detailBackdrop" src="" alt="">
    <div class="detail-gradient"></div>
    <div class="detail-content">
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-meta" id="detailMeta"></div>
        <p class="detail-overview" id="detailOverview"></p>
        <div class="detail-genres" id="detailGenres"></div>
        <p class="detail-cast" id="detailCast"></p>
        <button class="detail-play" onclick="playFromDetail()">▶ Reproducir</button>
    </div>
</div>

<div class="player-overlay" id="playerOverlay">
    <div class="player-top">
        <button class="player-back" id="playerBack">←</button>
        <span class="player-name" id="playerName">Canal</span>
    </div>
    <div class="player-screen">
        <video id="videoPlayer" playsinline style="display:none"></video>
        <iframe id="moviePlayer" style="display:none;width:100%;height:100%;border:none" allow="autoplay;encrypted-media" allowfullscreen></iframe>
        <div class="player-loading" id="playerLoading">
            <div class="spinner"></div><span style="color:#aaa">Cargando...</span>
        </div>
    </div>
    <div class="player-controls">
        <button class="ctrl-btn" onclick="seek(-10)">⏪</button>
        <button class="ctrl-btn ctrl-play" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="seek(10)">⏩</button>
        <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>
</div>

<div class="search-overlay" id="searchOverlay">
    <div class="search-header">
        <input type="text" id="searchInput" placeholder="Buscar...">
        <button onclick="closeSearch()">Cancelar</button>
    </div>
    <div id="searchResults"></div>
</div>

<div class="toast" id="toast"></div>

<script src="datos.js"></script>
<script src="tmdb.js"></script>
<script src="app.js"></script>
</body>
</html>
