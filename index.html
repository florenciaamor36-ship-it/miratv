<div class="page" id="pageSettings">
    <div class="settings-section">
        <h3>📥 Importar lista M3U</h3>
        <div class="settings-card">
            <label>URL de la lista M3U</label>
            <p class="hint">Pegá el enlace de cualquier lista IPTV para probarla</p>
            <input type="url" id="m3uUrl" placeholder="https://ejemplo.com/lista.m3u" style="width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.08);color:var(--text);padding:10px 14px;border-radius:8px;font-size:0.85rem;outline:none;font-family:'Inter',sans-serif;margin-bottom:10px">
            <button class="settings-btn primary" onclick="importarLista()">📥 Cargar lista</button>
            <p class="settings-info" id="importStatus"></p>
        </div>
    </div>
    <div class="settings-section">
        <h3>📺 Contenido precargado</h3>
        <button class="settings-btn primary" onclick="cargarTodo()">🔄 Recargar listas precargadas</button>
        <p class="settings-info">Canales: <span id="sCh"></span> | Listas: <span id="sListas"></span></p>
    </div>
    <div class="settings-section"><h3>🔍</h3><button class="settings-btn" onclick="openSearch()">🔍 Buscar canales</button></div>
    <div class="settings-section"><h3>🗑️</h3><button class="settings-btn danger" onclick="clearData()">🗑️ Borrar todo</button></div>
    <div class="settings-section"><h3>ℹ️</h3><p class="settings-info">IPTV Stream Pro v2.0</p></div>
</div>
