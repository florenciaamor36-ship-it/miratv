name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:    # <--- ESTO ES CLAVE PARA EL BOTÓN MANUAL

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor and Build
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init MiraTV com.laclaveargentina.miratv --web-dir=.
          npx cap add android
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiraTV-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
